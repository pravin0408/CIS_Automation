name: CIS Benchmark Compliance Automation

on:
  # ── Weekly scan every Monday at 6:00 AM IST = 00:30 UTC ──────────────────
  #schedule:
    #- cron: "30 0 * * 1" coommented will resume once will complete testing

  # ── Manual trigger with full control ─────────────────────────────────────
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "full"
        type: choice
        options:
          - full           # CMDB sync → launch scans → poll → export → report
          - sync_only      # CMDB → Tenable group sync only (no scans)
          - scan_only      # Launch + poll scans (skip CMDB sync)
          - report_only    # Export + report from already-completed scans
      test_mode:
        description: "TEST_MODE — dry run, no scans launched"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: cis-compliance-automation
  cancel-in-progress: false

jobs:
  cis-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 480    # 8-hour hard cap (scans can take hours)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Scheduled run → full pipeline ────────────────────────────────────
      - name: Run CIS automation (scheduled)
        if: github.event_name == 'schedule'
        env:
          # Tenable.io
          TENABLE_ACCESS_KEY: ${{ secrets.TENABLE_ACCESS_KEY }}
          TENABLE_SECRET_KEY: ${{ secrets.TENABLE_SECRET_KEY }}
          # ServiceNow CMDB
          SNOW_INSTANCE:      ${{ secrets.SNOW_INSTANCE }}
          SNOW_USER:          ${{ secrets.SNOW_USER }}
          SNOW_PASS:          ${{ secrets.SNOW_PASS }}
          # Settings
          MODE:               "full"
          TEST_MODE:          "0"
          POLL_INTERVAL:      "60"
          MAX_POLL_WAIT:      "14400"
          OUTPUT_DIR:         "output"
        run: python main.py

      # ── Manual run ───────────────────────────────────────────────────────
      - name: Run CIS automation (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          TENABLE_ACCESS_KEY: ${{ secrets.TENABLE_ACCESS_KEY }}
          TENABLE_SECRET_KEY: ${{ secrets.TENABLE_SECRET_KEY }}
          SNOW_INSTANCE:      ${{ secrets.SNOW_INSTANCE }}
          SNOW_USER:          ${{ secrets.SNOW_USER }}
          SNOW_PASS:          ${{ secrets.SNOW_PASS }}
          MODE:               ${{ github.event.inputs.mode }}
          TEST_MODE:          ${{ github.event.inputs.test_mode == 'true' && '1' || '0' }}
          POLL_INTERVAL:      "60"
          MAX_POLL_WAIT:      "14400"
          OUTPUT_DIR:         "output"
        run: python main.py

      # ── GitHub Actions UI summary ─────────────────────────────────────────
      - name: Job summary
        if: always()
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          echo "## 🛡 CIS Benchmark Compliance — $DATE" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "output/cis_scan_summary_${DATE}.csv" ]; then
            TOTAL=$(tail -n +2 output/cis_scan_summary_${DATE}.csv | wc -l | tr -d ' ')
            DONE=$(grep -c "COMPLETED" output/cis_scan_summary_${DATE}.csv || true)
            FAIL=$(grep -cE "LAUNCH_FAILED|NOT_FOUND|TIMEOUT" output/cis_scan_summary_${DATE}.csv || true)
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Scans completed | $DONE / $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Scans failed | $FAIL |" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "output/cis_compliance_${DATE}.csv" ]; then
            CHECKS=$(tail -n +2 output/cis_compliance_${DATE}.csv | wc -l | tr -d ' ')
            COMP=$(grep -c ",Compliant," output/cis_compliance_${DATE}.csv || true)
            NONCOMP=$(grep -c ",Non-Compliant," output/cis_compliance_${DATE}.csv || true)
            MANUAL=$(grep -c ",Manual Verification," output/cis_compliance_${DATE}.csv || true)
            echo "| ✅ Compliant checks | $COMP / $CHECKS |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Non-Compliant | $NONCOMP |" >> $GITHUB_STEP_SUMMARY
            echo "| ⚠ Manual Verification | $MANUAL |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full HTML report and raw CSVs available in **Artifacts** below." >> $GITHUB_STEP_SUMMARY

      # ── Upload all outputs ────────────────────────────────────────────────
      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cis-compliance-${{ github.run_id }}
          path: output/
          retention-days: 90
